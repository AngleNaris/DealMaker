<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 黑色背景 - 正方形无圆角 -->
  <rect x="0" y="0" width="512" height="512" fill="#000000"/>
  
  <!-- 合同文档主体 -->
  <rect x="85" y="64" width="342" height="384" fill="white" stroke="none"/>
  
  <!-- 文档顶部折叠效果 -->
  <polygon points="341,64 427,64 427,149" fill="#333333"/>
  
  <!-- 文档文本行 -->
  <line x1="149" y1="171" x2="363" y2="171" stroke="#666666" stroke-width="12" stroke-linecap="round"/>
  <line x1="149" y1="235" x2="363" y2="235" stroke="#666666" stroke-width="12" stroke-linecap="round"/>
  <line x1="149" y1="299" x2="299" y2="299" stroke="#666666" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 签名线条 -->
  <line x1="149" y1="363" x2="363" y2="363" stroke="#884aa1" stroke-width="8" stroke-dasharray="16,16"/>
  
  <!-- 钢笔图标 -->
  <g transform="translate(320, 256) rotate(-45)">
    <rect x="-21" y="-128" width="42" height="256" fill="#884aa1" rx="10"/>
    <polygon points="-32,128 32,128 0,192" fill="#884aa1"/>
  </g>
</svg>